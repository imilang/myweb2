<html lang="ko"><head>
  <meta charset="UTF-8">
  <title>모바일 반응형 웹 - 시(詩) 예제</title>
  <!-- 모바일 반응형을 위한 viewport 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style type="text/css" media="screen, print">
   @font-face {
    font-family: 'DungGeunMo.woff';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
    font-weight: normal;
    font-display: swap;
    }              
    *{ font-family: "DungGeunMo.woff", sans-serif }
    body {
      margin: 0;
      padding: 0;
      font-family: '맑은 고딕', sans-serif;
      background: #04103a;
      background-image: url('https://img.magnific.com/premium-photo/sky-full-stars-backgrounds-outdoors-nature_53876-179348.jpg?semt=ais_hybrid&w=740&q=80');
      background-repeat: no-repeat;
      background-size: 100%;
    }
    .poem-container {
      max-width: 300px;
      margin: 80px auto;
      background-color: white;
      border-radius: 20px;
      padding: 0px 50px 50px 50px;
      box-shadow: 0 4px 24px rgba(143, 143, 143, 0.367);
      color: #000000;
      text-align: center;
      line-height: 40px;
      transition: background 0.3s;
    }
    .title {
        background-color: #04103a ;
        font-size: 1.55rem;
        color: white;
        padding: 0.6rem 1.5rem;
        margin-left: -50px;
        margin-right: -50px;
        border-radius: 20px 20px 0 0;
    }
    .poem-title {
        font-size: 1.7rem;
        font-weight: bold;
        margin-top: 40px;
        color: #001d4f;
        letter-spacing: 0.05em;
    }
    .poem-author {
        text-align: right;
        padding-right: 30px;
        margin-top: 10px;
        font-size: 1.1rem;
        color: #000000;
        font-style: italic;
    }
    @media (max-width: 480px) {
      .poem-container {
        padding: 20px 8px;
        font-size: 1.04rem;
      }
      .poem-title {
        font-size: 1.22rem;
      }

      .title {
        margin-left: -8px;
        margin-right: -8px;
        margin-top: -20px;
        font-size: 1.04rem;
        }
    }
  </style>
</head>
<body>
  <div class="poem-container">
    <div class = "title">-`♥´- 내가 좋아하는 시-`♥´- </div>
    <div class="poem-title">서시</div>
    <div class="poem-author">- 윤동주</div>
    <div>
      <p>
        죽는 날까지 하늘을 우러러<br>
        한 점 부끄럼이 없기를,<br>
        잎새에 이는 바람에도<br>
        나는 괴로워했다.<br>
        별을 노래하는 마음으로<br>
        모든 죽어가는 것을 사랑해야지<br>
        그리고 나에게 주어진 길을<br>
        걸어가야겠다.<br>
        오늘 밤에도 별이 바람에 스치운다.
      </p>
    </div>
  </div>
